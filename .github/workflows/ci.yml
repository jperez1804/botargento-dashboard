name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TENANT_DB_URL: postgres://postgres:postgres@localhost:5432/dashboard_test
      AUTH_SECRET: ci-only-secret-not-used-in-prod-but-must-be-16-chars
      AUTH_URL: http://localhost:3000
      AUTH_EMAIL_FROM: ci@botargento.com.ar
      RESEND_API_KEY: re_ci_placeholder
      CLIENT_NAME: CI Tenant
      CLIENT_PRIMARY_COLOR: "#3b82f6"
      VERTICAL: real-estate
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Apply migrations and seed
        run: |
          pnpm db:migrate
          pnpm db:seed:dev

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            .playwright-dev-server.log
          retention-days: 7
