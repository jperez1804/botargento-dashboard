name: Deploy

# Manual rollouts — `workflow_dispatch` keeps a human between merge and clients
# seeing the change. Pin a SHA tag to roll back; pin "latest" to track main.

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant directory name (e.g. client1) or 'all'"
        required: true
        default: "all"
      tag:
        description: "Image tag to deploy (commit SHA or 'latest')"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            /opt/scripts/update-dashboards.sh "${{ inputs.tenant }}" "${{ inputs.tag }}"
